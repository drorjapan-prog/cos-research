{{ define "main" }}
  <h1>{{ .Title }}</h1>
  {{ with .Content }}
    <div class="page-content">{{ . }}</div>
  {{ end }}
  {{ if .Pages }}
    <ul class="default-list">
      {{ range .Pages }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  {{ end }}
{{ end }}
