<div class="news-item">
  <span class="news-date">{{ .Date.Format "2006.01.02" }}</span>
  {{ with .Params.category }}<span class="news-category">{{ . }}</span>{{ end }}
  <span class="news-title">
    {{ $link := .Params.link }}
    {{ if $link }}
      <a href="{{ $link }}">{{ .Title }}</a>
    {{ else }}
      {{ .Title }}
    {{ end }}
  </span>
</div>
