<footer class="site-footer">
  <div class="container">
    <div class="footer-grid">
      <div class="footer-info">
        <div class="footer-title">{{ .Site.Params.organization.name_ja }}</div>
        <div class="footer-title-en">{{ .Site.Params.organization.name_en }}</div>
        <p>事務局：{{ .Site.Params.organization.parent_ja }}内</p>
        <p><a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a></p>
      </div>
      <nav class="footer-nav" aria-label="フッターナビゲーション">
        {{ range .Site.Menus.main }}
          <a href="{{ .URL }}">{{ .Name }}</a>
        {{ end }}
      </nav>
    </div>
    <div class="footer-copyright">
      © {{ now.Format "2006" }} {{ .Site.Params.organization.name_en }}
    </div>
  </div>
</footer>
