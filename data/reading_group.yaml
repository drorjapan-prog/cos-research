sessions:
  - date: "2026-05-01"
    paper:
      title: "Clinical Organizational Science: an integrative framework for structural intervention in complex organizations"
      authors: "Yamanaka, M., & Nakamori, M."
      journal: "Frontiers in Psychology"
      year: 2026
      doi: "https://doi.org/10.3389/fpsyg.2026.1827324"
    discussion_note: |
      臨床組織科学（COS）の理論的枠組みについて、執筆者による解説と質疑応答を行った。
      創発の橋（emergence bridge）による個人の習慣化から組織アトラクター遷移までの多層的メカニズム、
      および3つの介入技法（場の勾配理論／ループ変換設計／神経基盤設計）の階層的アーキテクチャを中心に議論した。
